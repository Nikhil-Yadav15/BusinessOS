name: BusinessOS Cron Jobs

on:
  schedule:
    # Run twice a day at 00:00 and 12:00 UTC
    - cron: '0 0,12 * * *'
  # Allow manual triggering
  workflow_dispatch:

jobs:
  run-cron-tasks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Evaluate Udhaar Engine
        run: |
          curl -X GET "${{ secrets.PROD_API_URL }}/api/system/jobs/evaluate-udhaar" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"

      - name: Trigger Outbox Queue Processing
        run: |
          curl -X GET "${{ secrets.PROD_API_URL }}/api/system/cron/outbox" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"

      - name: Trigger Notification Delivery Pipeline
        run: |
          curl -X POST "${{ secrets.PROD_API_URL }}/api/system/jobs/deliver-notifications" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
